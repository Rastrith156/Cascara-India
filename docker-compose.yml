version: '3.8'

services:

  # ── Backend: Node.js API ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: cascara-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./backend/.env
    networks:
      - cascara-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend: Nginx static server ────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cascara-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cascara-net

networks:
  cascara-net:
    driver: bridge
